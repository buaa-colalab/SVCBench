<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SVCBench Project Card</title>
  <desc id="desc">A project card for SVCBench, a streaming video counting benchmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="48%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="55%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="100" r="210" fill="#2dd4bf" opacity="0.18"/>
  <circle cx="120" cy="540" r="260" fill="#60a5fa" opacity="0.16"/>
  <g filter="url(#softShadow)">
    <rect x="72" y="68" width="1056" height="494" rx="44" fill="#ffffff" opacity="0.1"/>
    <rect x="72" y="68" width="1056" height="494" rx="44" fill="none" stroke="#ffffff" stroke-opacity="0.22"/>
  </g>
  <text x="116" y="152" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="6">PROJECT HOMEPAGE</text>
  <text x="116" y="254" fill="#ffffff" font-family="Arial, sans-serif" font-size="92" font-weight="900" letter-spacing="-6">SVCBench</text>
  <text x="116" y="325" fill="#e0f2fe" font-family="Arial, sans-serif" font-size="38" font-weight="700">Streaming Video Counting Benchmark</text>
  <text x="116" y="382" fill="#dbeafe" font-family="Arial, sans-serif" font-size="30">for Spatial-Temporal State Maintenance</text>
  <line x1="128" y1="474" x2="930" y2="474" stroke="url(#line)" stroke-width="10" stroke-linecap="round"/>
  <g fill="#ffffff" stroke="#0f172a" stroke-width="7">
    <circle cx="238" cy="474" r="23"/>
    <circle cx="468" cy="474" r="23"/>
    <circle cx="694" cy="474" r="23"/>
    <circle cx="902" cy="474" r="23"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff">
    <text x="972" y="445">406 videos</text>
    <text x="972" y="490">1,000 QA pairs</text>
    <text x="972" y="535">4,576 queries</text>
  </g>
</svg>
